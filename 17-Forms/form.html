<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login BitLevel</title>
    <link rel="stylesheet" href="style.css">
   
   
</head>
<body> 
    <div class="form">
        <form action="#" method="post">
            <label for="escolaridade">Escolaridade:</label>
                <select name="escolaridade">
                    <option value="em">Ensino Medio</option>
                    <option value="nt">Nivel Tecnico</option>
                    <option value="ns">Nivel superior</option>
                </select>
            <br><br>

            <label for="cargo">Cargo:</label>
                <input type="radio" name="cargo" value="1" checked> Gerencia
                <input type="radio" name="cargo" value="2"> financeiro
                <input type="radio" name="cargo" value="3"> Recepcao
                <input type="radio" name="cargo" value="4"> administracao
            <br><br>
            
            <label for="area">Area:</label>
                <input type="checkbox" name="area1" value="Com" checked> Computacao
                <input type="checkbox" name="area2" value="eng"> Engenharia
                <input type="checkbox" name="area3" value="bio"> Biologia
                <input type="checkbox" name="area4" value="psi"> Psiocologia
            <br><br>
            
            <label for="obs">Observacao: </label>
                <textarea name="obs" cols="20" rows="5"></textarea>
            <br><br>

        
        </form>
    </div>    
</body>
</html>
